name: Build and publish Nuxt app

on:
  push:
    branches: ['master']
  pull_request:
    branches: ['master']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 11
      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run checks
        run:
          pnpm lint && pnpm format && pnpm style && pnpm typecheck && pnpm test
      - name: Build SSR app
        env:
          NUXT_PUBLIC_BOARDS_API_BASE_URL: ${{ vars.BOARDS_API_BASE_URL }}
        run: test -n "$NUXT_PUBLIC_BOARDS_API_BASE_URL" && pnpm build

      - name: Upload
        if: github.ref == 'refs/heads/master'
        uses: marcodallasanta/ssh-scp-deploy@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }} # "example.com"
          port: ${{ secrets.SSH_PORT }} # 22
          user: ${{ secrets.SSH_USER }} # "user"
          password: ${{ secrets.SSH_PASSWORD }} # "password"
          local: .output/*
          remote: '/home/laraue/frontend/boards'
